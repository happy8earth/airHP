cycle: simple_brayton        # cycles/ 폴더의 모듈명과 일치
fluid: Air
mass_flow: 0.5               # [kg/s]
T_turbine_outlet: 173.15     # [K]  (-100°C → K 변환은 main.py에서)
eta_compressor: 0.75
eta_turbine: 0.80
P_low: 101325                # [Pa]  (1 atm)
T_turbine_inlet: 298.15      # [K]  (25°C, Hot HX 출구 = 터빈 입구)
T_compressor_inlet: 298.15   # [K]  (25°C, Cold HX 출구 = 압축기 입구, 대기 복귀 가정)
pressure_ratio: null         # null: scipy 역산, 숫자: 고정값
