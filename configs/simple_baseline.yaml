cycle: simple_brayton        # cycles/ 폴더의 모듈명과 일치
fluid: Air
mass_flow: 0.382             # [kg/s]
P_low: 101325                # [Pa]  (1 atm)
pressure_ratio: null         # null: scipy 역산, 숫자: 고정값

comp:
  eta_isen: 0.75             # 등엔트로피 효율 [-]  η_c = (h2s - h1) / (h2 - h1)
  T_inlet: 298.15            # [K]  (25°C)  State 1 = Cold HX 출구 = 압축기 입구

expander:
  eta_isen: 0.80             # 등엔트로피 효율 [-]  η_t = (h3 - h4) / (h3 - h4s)
  T_outlet_target: 173.15   # [K]  (-100°C)  outer brentq 수렴 목표

hx_aftercooler:
  T_outlet: 298.15           # [K]  (25°C)  TODO 1-1: UA·LMTD 전환 후 제거
  UA_rated: 870              # [W/K]  정격 UA
  m_dot_rated: 0.382         # [kg/s]  정격 1차측(Air) 유량
  T_secondary: 291.15        # [K]  (18°C)  냉각수 입구 온도
  m_dot_secondary: 0.38      # [kg/s]  냉각수 유량
  dP: 0                      # [Pa]  압력 손실 (0 = 현재 무시)

hx_load:
  UA_rated: 1301.01          # [W/K]  정격 UA
  m_dot_rated: 0.382         # [kg/s]  정격 1차측(IM-7) 유량
  T_secondary: 197.65        # [K]  (-75.5°C)  IM-7 입구 온도 (냉동 공간)
  m_dot_secondary: 0.827     # [kg/s]  IM-7 유량
  dP: 0                      # [Pa]  압력 손실 (0 = 현재 무시)
