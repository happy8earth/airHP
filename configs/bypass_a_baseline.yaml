cycle: bypass_a_brayton        # cycles/ 폴더의 모듈명과 일치
fluid: Air
mass_flow: 0.382             # [kg/s]
P_low: 101325                # [Pa]  (1 atm)
pressure_ratio: 2.4          # 고정값 필수 (DOF를 닫는 핵심 파라미터; null 불가)

comp:
  eta_isen: 0.75             # 등엔트로피 효율 [-]
  T_inlet: 298.15            # [K]  초기 추정값 (fixed-point iteration 수렴 후 갱신)

expander:
  eta_isen: 0.80             # 등엔트로피 효율 [-]
  # T_outlet_target: bypass 사이클에서는 사용 안 함 (참고값 아님)

hx_aftercooler:
  hotside:                    # Air (working fluid, (1-x)·ṁ 흐름)
    htc_rated: 152.5          # [W/m²K]
    area: 11.405              # [m²]
    m_dot_rated: 0.382        # [kg/s]  정격 Air 유량
  coldside:                   # water (냉각수)
    htc_rated: 459.0          # [W/m²K]
    area: 3.791               # [m²]
    m_dot_rated: 0.380        # [kg/s]  정격 냉각수 유량
    T_inlet: 291.15           # [K]  (18°C)  냉각수 입구 온도
  dP: 0                       # [Pa]  압력 손실 (0 = 현재 무시)

hx_load:
  hotside:                    # IM-7 (냉동 공간)
    htc_rated: 273.3          # [W/m²K]
    area: 9.52                # [m²]
    m_dot_rated: 0.827        # [kg/s]  정격 IM-7 유량
    T_inlet: 308.15          # [K]  (197.65, -75.5°C)  IM-7 입구 온도 (냉동 공간)
  coldside:                   # Air (working fluid, 전체 ṁ 흐름)
    htc_rated: 107.2          # [W/m²K]
    area: 24.28               # [m²]
    m_dot_rated: 0.382        # [kg/s]  정격 Air 유량
  T_sec_out_target: 303.15   # [K]  (193.15K, -80.0°C)  역산 목표: IM-7 출구온도 (bypass_solver 사용)
  # 주의: T_sec_out_target < T_sec_in (= hotside.T_inlet = 197.65 K) 이어야 함
  # 베이스라인(x=0) 복권 사이클 T_sec_out ≈ 190-191 K → 목표는 190~197.65 K 범위
  dP: 0                       # [Pa]  압력 손실 (0 = 현재 무시)

hx_recup:
  hotside:                    # Air 고압 스트림 (State 3 → State 4, (1-x)·ṁ)
    htc_rated: 123.4          # [W/m²K]
    area: 82.67               # [m²]
    m_dot_rated: 0.382        # [kg/s]  정격 유량
  coldside:                   # Air 저압 스트림 (State 6 → State 1, ṁ)
    htc_rated: 116.6          # [W/m²K]
    area: 87.53               # [m²]
    m_dot_rated: 0.382        # [kg/s]  정격 유량
  dP_hot: 0                   # [Pa]  고압 스트림 압력 손실
  dP_cold: 0                  # [Pa]  저압 스트림 압력 손실
